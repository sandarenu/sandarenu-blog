<!--
  This file defines the main sidebar that the user can toggle in and out of
  view. This is included in every file.

  Most of this was taken directly from the Lanyon example site.

  Here we simply include a link to the homepage, a link to the blog posts,
  and some copyright information.
-->

<!-- Target for toggling the sidebar `.sidebar-checkbox` is for regular
     styles, `#sidebar-checkbox` for behavior. -->
<input type="checkbox" class="sidebar-checkbox" id="sidebar-checkbox">

<!-- Toggleable sidebar -->
<div class="sidebar" id="sidebar">

    <nav class="sidebar-nav">
        <a class="sidebar-nav-item" href="/">Home</a>

        <a class="sidebar-nav-item" href="/posts">Blog</a>
    </nav>

    <nav class="sidebar-social st-shape-icon st-multi-color">
        <ul>
            <li><a href="http://sandarenu.github.io/index.xml" target="_blank" title="Subscribe by RSS" class="st-icon-rss st-shape-icon">RSS</a></li>
            <li><a href="https://twitter.com/CSandarenu" target="_blank" title="Follow me on Twitter" class="st-icon-twitter st-shape-icon">Twitter</a></li>
            <li><a href="https://www.linkedin.com/in/sandarenu" target="_blank" title="LinkedIn" class="st-icon-linkedin st-shape-icon">LinkedIn</a></li>
            <li><a href="http://github.com/sandarenu" target="_blank" title="GitHub" class="st-icon-github-alt st-shape-icon">GitHub</a></li>

        </ul>
    </nav>

    <div class="sidebar-item">
        <p>
            &copy; 2014 Chathurika Sandarenu. Powered by <a href="http://hugo.spf13.com">Hugo</a>. Design adapted from
            <a href="http://lanyon.getpoole.com">Lanyon</a>.
        </p>
    </div>
</div>
