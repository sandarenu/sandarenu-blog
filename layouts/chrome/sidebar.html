  This file defines the main sidebar that the user can toggle in and out of

  and some copyright information.

     styles, `#sidebar-checkbox` for behavior. -->

<!-- Toggleable sidebar -->

                    class="icon icon-feed-2"></span>RSS</a></li>

                    class="icon icon-twitter"></span>Twitter</a></li>
            <li><a href="https://www.linkedin.com/in/sandarenu" target="_blank" title="LinkedIn" class=""><span class="
                        icon icon-linkedin"></span>LinkedIn</a></li>
            <li><a href="http://github.com/sandarenu" target="_blank" title="GitHub" class=""><span class="
                        icon icon-github"></span>GitHub</a></li>

    </div>

    <div class="sidebar-item">
